name: Release Creation

on: 
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install dependencies
      run: npm ci

    - name: Webpack build
      run: npm run build

    # Remove the 'v' from the tag for versioning (e.g. v1.0.0 becomes 1.0.0)
    - id: get_version
      run: |
        echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        echo "FOUNDRY_MANIFEST=https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json" >> $GITHUB_ENV
        echo "FOUNDRY_DOWNLOAD=https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip" >> $GITHUB_ENV

    # Generate module.json from the template
    - id: generate_manifest
      run: |
        cat module-template.json > module.json

    # Substitute the Manifest, Download, and Version directly in the newly created module.json
    - name: Substitute Manifest and Download Links For Versioned Ones
      id: sub_manifest_link_version
      uses: restackio/update-json-file-action@2.1
      with:
        file: 'module.json'
        fields: "{\"version\": \"${{env.VERSION}}\", \"download\": \"${{env.FOUNDRY_DOWNLOAD}}\", \"manifest\": \"${{env.FOUNDRY_MANIFEST}}\"}"

    # Create a zip file with all files required by CAT (Notice 'dist' replaces 'scripts')
    - name: Zip Module Files
      run: zip -r ./module.zip module.json dist styles templates lang README.md

    # Create a release for this specific version
    - name: Update Release with Files
      id: create_version_release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true 
        name: ${{github.event.release.name}}
        draft: false
        prerelease: false
        token: ${{secrets.GITHUB_TOKEN}}
        artifacts: './module.json, ./module.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}

    # Ping Foundry VTT API to auto-publish (Requires FOUNDRY_KEY repository secret)
    #- name: FoundryVTT AutoPublish
    #  uses: fjogeleit/http-request-action@v2
    #  continue-on-error: true
    #  with:
    #    url: 'https://foundryvtt.com/_api/packages/release_version/'
    #    method: 'POST'
    #    customHeaders: '{"Content-Type": "application/json", "Authorization" : "${{ secrets.FOUNDRY_KEY }}"}'
    #    data: '{"dry_run": false, "id" : "cat", "release": {"version" : "${{env.VERSION}}", "manifest": "${{env.FOUNDRY_MANIFEST}}", "notes" : "https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}", "compatibility" : {"minimum": "14", "verified": "14", "maximum": "14"} } }'